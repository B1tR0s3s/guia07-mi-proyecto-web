<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mi Proyecto Web</title>

    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    
    <p id="resultado"></p>
    <section class="tarjeta">
      <h1>Bienvenido a mi Pagina Web</h1>
      <p>Este proyecto fue publicado usando GitHub.</p>
      <p>Ingrese su nombre:</p>
  
      <input type="text" id="nombre" placeholder="Escribe tu nombre" />
  
      <button onclick="saludar()">Saludar</button>
      <div class="contenedor-formulario">
        <h2>Formulario de contacto</h2>

        <form id="formularioContacto">
          <input type="text" id="nombreContacto" placeholder="Escribe tu nombre" />
          <input type="text" id="apellido" placeholder="Ingrese su apellido" />
          <input type="tel" id="telefono" placeholder="Ingrese su teléfono" />
          <input type="email" id="correo" placeholder="Ingrese su correo" />

          <textarea
            id="mensaje"
            placeholder="Escriba su mensaje"
            rows="5"
          ></textarea>

          <button type="submit">Enviar formulario</button>
        </form>

        <div id="mensajeCorreo" class="mensaje"></div>
      </div>
    </section>
    <!-- Enlace al archivo JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
